# ── Claude Code Settings Sync Configuration ──────────────
# sync.sh / sync.ps1 에서 읽는 설정 파일

# ── Sync Targets ──────────────────────────────────────────
# ~/.claude/ 아래의 동기화 대상 (공백 구분)
SYNC_TARGETS="CLAUDE.md settings.json statusline-command.sh commands skills dev-pipeline"

# ── Exclude Patterns ─────────────────────────────────────
# diff/copy 시 제외할 패턴 (공백 구분, glob 지원)
SYNC_EXCLUDES="__pycache__ *.bak *.tmp .DS_Store"

# ── Git Settings ─────────────────────────────────────────
REMOTE_BRANCH="main"
COMMIT_PREFIX="sync"

# ── Source Directory ─────────────────────────────────────
# 동기화 소스 디렉토리 (기본값: ~/.claude)
SOURCE_DIR="$HOME/.claude"
